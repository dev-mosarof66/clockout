<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="78%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- brand row -->
  <g transform="translate(80,80)">
    <rect width="64" height="64" rx="16" fill="#F97316"/>
    <g fill="none" stroke="#0A0A0A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(16,16)">
      <circle cx="16" cy="16" r="13"/>
      <path d="M16 8v8l5 3"/>
    </g>
    <text x="84" y="44" font-family="'Space Grotesk', Arial, sans-serif" font-size="34" font-weight="700" fill="#FAFAFA">Clockout</text>
  </g>

  <!-- headline -->
  <text x="80" y="290" font-family="'Space Grotesk', Arial, sans-serif" font-size="74" font-weight="800" fill="#FAFAFA">Your workday should end.</text>
  <text x="80" y="372" font-family="'Space Grotesk', Arial, sans-serif" font-size="74" font-weight="800" fill="#F97316">Your phone disagrees.</text>

  <!-- subhead -->
  <text x="80" y="452" font-family="Arial, sans-serif" font-size="30" fill="#A3A3A3">Clockout auto-detects your work apps and gently clocks you</text>
  <text x="80" y="492" font-family="Arial, sans-serif" font-size="30" fill="#A3A3A3">out after hours. Built for remote professionals.</text>

  <!-- footer tag -->
  <text x="80" y="572" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#4ADE80">Reclaim your evenings · Android first · On-device</text>
</svg>
